name: Infra

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:

# fmt + validate run without AWS credentials (no backend, no plan), so this
# is a safe CI signal. `terraform apply` is run locally via the documented
# flow (see README) using a privileged IAM identity — not from CI.
jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate -no-color
