# Tells External Secrets where to read from: AWS Secrets Manager in eu-west-1,
# authenticating via the controller pod's IRSA role (no static keys).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
---
# Syncs AWS secret `m2cloud/app` (JSON: DATABASE_URL, JWT_SECRET, RABBITMQ_URL,
# RABBITMQ_PASSWORD) into the K8s Secret `app-secrets` consumed by the apps.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: m2cloud/app
---
# Materializes just the RabbitMQ password for the Bitnami chart.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rabbitmq-credentials
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: ClusterSecretStore
  target:
    name: rabbitmq-credentials
    creationPolicy: Owner
  data:
    - secretKey: rabbitmq-password
      remoteRef:
        key: m2cloud/app
        property: RABBITMQ_PASSWORD
