# External Secrets Operator install values.
# The controller ServiceAccount is annotated with the IRSA role
# (m2cloud-eso, created by Terraform) so it can read AWS Secrets Manager
# WITHOUT any static credentials. At install:
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace -f external-secrets.yaml \
#     --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=<ESO_ROLE_ARN>"
installCRDs: true
serviceAccount:
  create: true
  name: external-secrets
  # annotations injected at install time from the Terraform output `eso_role_arn`.
