apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: m2cloud
  namespace: app
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Most specific paths first; ingress-nginx matches longest prefix.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-api
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: realtime
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
